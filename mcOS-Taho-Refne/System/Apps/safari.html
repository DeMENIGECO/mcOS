<!DOCTYPE html>
<html>
<body style="margin:0">
<input id="url" placeholder="https://..." style="width:100%;padding:10px;font-size:16px">
<iframe id="frame" style="width:100%;height:90vh;border:none;"></iframe>

<script>
url.onkeydown=e=>{
 if(e.key==="Enter"){
   frame.src=url.value;
 }
}
</script>
</body>
</html>

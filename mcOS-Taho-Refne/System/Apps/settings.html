<style>
body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: transparent;
 color: white;
 margin: 0;
 padding: 10px;
}

input, textarea, button {
 padding: 10px 15px;
 border-radius: 12px;
 border: none;
 outline: none;
 margin-top: 10px;
 background: rgba(255,255,255,0.15);
 color: white;
 box-shadow: 0 5px 15px rgba(0,0,0,0.3);
 transition: 0.2s;
}

input:focus, textarea:focus, button:hover {
 background: rgba(255,255,255,0.25);
 box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 10px;
}

td, th {
 padding: 8px;
 border-bottom: 1px solid rgba(255,255,255,0.2);
}

th {
 font-weight: bold;
 text-align: left;
}

::-webkit-scrollbar {
 width: 10px;
}

::-webkit-scrollbar-track {
 background: rgba(255,255,255,0.05);
 border-radius: 10px;
}

::-webkit-scrollbar-thumb {
 background: rgba(255,255,255,0.3);
 border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
 background: rgba(255,255,255,0.5);
}
</style>

<h2>Settings</h2>

<h3>Info device</h3>
<button onclick="window.parent.location.href = '../info/VERSION.txt'">Versione</button>
<button onclick="window.parent.location.href = '../info/LICENSE.txt'">Licenza sistema</button>
<button onclick="window.parent.location.href = '../info/CREDITS.txt'">Crediti</button>
<button onclick="window.parent.location.href = '../info/WHATS-NEW.txt'">Novità</button>

<h3>Aggiornamento</h3>

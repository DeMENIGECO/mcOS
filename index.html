<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>mcOS Hub</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1920') center/cover no-repeat;
  margin: 0;
  padding: 0;
  color: white;
}

h1 {
  text-align: center;
  margin-top: 50px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  padding: 50px 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  width: 300px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.card h2 {
  margin-top: 0;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  font-size: 16px;
  margin-top: 15px;
  transition: 0.2s;
}

button:hover {
  background: rgba(255,255,255,0.35);
}
</style>
</head>
<body>

<h1>mcOS Versions</h1>

<div class="container">
  <div class="card">
    <h2>mcOS Taho</h2>
    <p>La prima versione di mcOS con il famoso effetto vetro liquido ispirato a MacOS Tahoe.</p>
    <button onclick="window.location.href='https://demenigeco.github.io/mcOS/Taho/'">Vai al sistema</button>
  </div>

  <!-- Nuove versioni qui -->
  <!--
  <div class="card">
    <h2>mcOS Futuro</h2>
    <p>Versione in arrivo...</p>
    <button disabled>Prossimamente</button>
  </div>
  -->
</div>

<div style="text-align:center; margin:50px;">
  <button onclick="window.location.href='https://github.com/DeMENIGECO/mcOS'">Repository</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcOS</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
  overflow-x: hidden;
}

/* Background bubbles stile Windows 12 */
.bubble {
  position: absolute;
  width: var(--d);
  height: var(--d);
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.6;
}

#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 60px;
  margin: 0;
}

.hero span {
  opacity: 0.7;
}

/* BOTTONI */
.btn {
  margin-top: 30px;
  padding: 15px 25px;
  border-radius: 15px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  font-size: 18px;
  backdrop-filter: blur(10px);
  transition: 0.2s;
}

.btn:hover {
  background: rgba(255,255,255,0.35);
}

/* CARD */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  padding: 50px 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  width: 300px;
  text-align: center;

  box-shadow: 0 20px 60px rgba(0,0,0,0.5);

  transform-style: preserve-3d;
  transition: transform 0.25s ease, box-shadow 0.25s ease;

  position: relative;
  overflow: hidden;

  /* animazione entrata */
  opacity: 0;
  transform: translateY(40px) scale(0.95);
}

/* card visibile */
.card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* glow dinamico */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--x) var(--y),
    rgba(255,255,255,0.25),
    transparent 40%);
  opacity: 0;
  transition: opacity 0.2s;
}

.card:hover::before {
  opacity: 1;
}

/* highlight bordo */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  pointer-events: none;
}

/* hover extra */
.card:hover {
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}

.card h2 {
  margin-top: 0;
}

footer {
  text-align: center;
  padding: 50px;
}
</style>
</head>

<body>

<!-- Background -->
<div id="bg">
  <div class="bubble" style="background:#f2b456; --d:200px; top:20%; left:25%;"></div>
  <div class="bubble" style="background:#fffcb2; --d:250px; top:65%; left:65%;"></div>
  <div class="bubble" style="background:#fce079; --d:300px; top:40%; left:80%;"></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>mcOS</h1>
  <p>Un sistema operativo web ispirato a macOS</p>

  <button class="btn" onclick="goSystem()">Avvia mcOS 🚀 (Ultima versione)</button>
</div>

<!-- VERSIONI -->
<div class="container">

  <div class="card">
    <h2>mcOS Taho <span style="background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 10px; font-size: 14px;">Ultima versione</span></h2>
    <p>Versione con effetto vetro liquido stile macOS Tahoe.</p>
    <button class="btn" onclick="window.location.href='https://demenigeco.github.io/mcOS/mcOS-Taho-Refne/'">
      Vai al sistema
    </button>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <button class="btn" onclick="window.location.href='https://github.com/DeMENIGECO/mcOS'">
    Repository
  </button>

  <button class="btn" onclick="window.location.href='https://demenigeco.github.io/mcOS/docs'">
    Docs
  </button>
</footer>

<script>
function goSystem(){
  document.body.style.transition="0.3s";
  document.body.style.transform="scale(0.9)";
  document.body.style.opacity="0";

  setTimeout(()=>{
    window.location.href="https://demenigeco.github.io/mcOS/mcOS-Taho-Refne/";
  },300);
}

const cards = document.querySelectorAll(".card");

/* ====== ENTRATA ANIMATA ====== */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
}, { threshold: 0.2 });

cards.forEach(card => observer.observe(card));


/* ====== EFFETTI MOUSE ====== */
cards.forEach(card => {

  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // glow posizione
    card.style.setProperty("--x", x + "px");
    card.style.setProperty("--y", y + "px");

    // tilt 3D
    const rotateY = (x / rect.width - 0.5) * 20;
    const rotateX = (y / rect.height - 0.5) * -20;

    card.style.transform = `
      rotateX(${rotateX}deg)
      rotateY(${rotateY}deg)
      scale(1.05)
    `;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0) scale(1)";
  });

});


/* ====== MAGNET EFFECT (tipo Windows 12) ====== */
cards.forEach(card => {

  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();

    const offsetX = (e.clientX - rect.left - rect.width/2) * 0.1;
    const offsetY = (e.clientY - rect.top - rect.height/2) * 0.1;

    card.style.transform += `
      translate(${offsetX}px, ${offsetY}px)
    `;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0) scale(1) translate(0,0)";
  });

});
</script>

</body>
</html>

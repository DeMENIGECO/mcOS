<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>mcOS Docs - date</title>

<style>
body {
 margin: 0;
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 color: white;
 padding: 40px;

 background:
  radial-gradient(circle at 20% 20%, rgba(42, 60, 255, 0.35), transparent 40%),
  radial-gradient(circle at 80% 30%, rgba(255, 42, 166, 0.30), transparent 40%),
  radial-gradient(circle at 40% 80%, rgba(0, 255, 213, 0.25), transparent 40%),
  #0b0f1a;
}

/* contenitore glass */
.container {
 max-width: 800px;
 margin: auto;

 background: rgba(255, 255, 255, 0.06);
 border: 1px solid rgba(255, 255, 255, 0.15);
 border-radius: 20px;
 padding: 30px;

 backdrop-filter: blur(25px);
 -webkit-backdrop-filter: blur(25px);

 box-shadow:
  0 15px 40px rgba(0,0,0,0.5),
  inset 0 1px 0 rgba(255,255,255,0.15);
}

/* titolo */
h1 {
 margin-top: 0;
 font-size: 32px;
}

/* sottotitoli */
h2 {
 margin-top: 25px;
 font-size: 20px;
}

/* codice stile terminale */
code {
 background: rgba(0,0,0,0.4);
 padding: 4px 8px;
 border-radius: 8px;
 color: #00ff88;
}

/* bottone back */
.back {
 display: inline-block;
 margin-bottom: 20px;
 text-decoration: none;
 color: white;
 opacity: 0.8;
 transition: 0.2s;
}

.back:hover {
 opacity: 1;
}
</style>
</head>

<body>

<a class="back" href="index.html">← Torna ai Docs sul Terminale</a>

<div class="container">

 <h1><i class="fa-solid fa-terminal"></i> date</h1>

 <p>Mostra la data</p>

 <h2>Output esempio</h2>
 <code>user@mcintosh-hd:/home/user$ date <br/>
Mon Apr 27 2026 11:17:08 GMT+0200 (Ora legale dell’Europa centrale)</code>

</body>
</html>

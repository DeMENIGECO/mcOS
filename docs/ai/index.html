<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>mcOS Docs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
 margin: 0;
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 color: white;
 padding: 30px;

 /* 🌌 sfondo stile macOS */
 background:
  radial-gradient(circle at 20% 20%, rgba(42, 60, 255, 0.35), transparent 40%),
  radial-gradient(circle at 80% 30%, rgba(255, 42, 166, 0.30), transparent 40%),
  radial-gradient(circle at 40% 80%, rgba(0, 255, 213, 0.25), transparent 40%),
  #0b0f1a;
}

/* titolo */
h1 {
 margin-bottom: 10px;
 font-size: 34px;
 letter-spacing: 0.5px;
}

p {
 opacity: 0.8;
}

/* griglia card */
.grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
 gap: 20px;
 margin-top: 20px;
}

/* ✨ LIQUID GLASS CARD */
.card {
 background: rgba(255, 255, 255, 0.06);
 border-radius: 20px;
 padding: 30px;
 text-decoration: none;
 color: white;
 position: relative;
 overflow: hidden;
 min-height: 140px;

 backdrop-filter: blur(25px);
 -webkit-backdrop-filter: blur(25px);

 border: 1px solid rgba(255, 255, 255, 0.18);

 box-shadow:
  0 10px 30px rgba(0,0,0,0.45),
  inset 0 1px 0 rgba(255,255,255,0.15);

 transition: all 0.25s ease;
}

/* 🔆 riflesso vetro */
.card::before {
 content: "";
 position: absolute;
 top: -60%;
 left: -60%;
 width: 220%;
 height: 220%;
 background: radial-gradient(
   circle at top left,
   rgba(255,255,255,0.25),
   transparent 45%
 );
 transform: rotate(25deg);
 pointer-events: none;
}

/* hover effetto “Apple pop” */
.card:hover {
 transform: translateY(-6px) scale(1.03);
 background: rgba(255, 255, 255, 0.10);

 box-shadow:
  0 18px 45px rgba(0,0,0,0.6),
  inset 0 1px 0 rgba(255,255,255,0.25);
}

/* titolo card */
.card h2 {
 margin: 0 0 10px 0;
 font-size: 18px;
}

/* descrizione */
.card p {
 margin: 0;
 font-size: 14px;
 opacity: 0.75;
}

/* link reset */
a {
 color: inherit;
}
</style>
</head>

<body>

<h1><i class="fa-solid fa-robot"></i> Orange Intelligence</h1>
<p>Ecco i nostri articoli su Orange Intelligence.</p>

<div class="grid">

 <a class="card" href="use.html">
  <h2><i class="fa-solid fa-robot"></i> Uso</h2>
  <p>Come si usa Orange Intelligence?</p>
 </a>

 

<a class="card" href="../">
  <h2><i class="fa-solid fa-arrow-left"></i> Indietro</h2>
  <p>Torna alla home dei Docs.</p>
 </a>



</div>

</body>
</html>
